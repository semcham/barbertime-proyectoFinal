databases:
  - name: barbertime-db
    plan: free
    databaseName: barbertime
    user: barbertime_user

services:
  - type: web
    name: barbertime
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn barbertime.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: barbertime-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: SERVER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false


